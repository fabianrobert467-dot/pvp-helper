<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克 PVP 终极辅助终端</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; font-size: 22px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #34495e; font-size: 14px; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e0e6ed; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .panel { display: none; margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
        .bar-bg { background: #e2e8f0; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; width: 50%; transition: width 0.5s ease; }
        .tags-container div { background: #fee2e2; color: #b91c1c; padding: 6px 10px; margin-bottom: 8px; border-radius: 6px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏆 洛克战术分析中心</h2>
    
    <datalist id="petList"></datalist>

    <div class="input-group">
        <label>🛡️ 我方精灵 (输入名称搜索)</label>
        <input type="text" id="myPet" list="petList" placeholder="例如：圣煌后" onchange="runAnalysis()">
    </div>

    <div class="input-group">
        <label>🎯 敌方精灵 (输入名称搜索)</label>
        <input type="text" id="enemyPet" list="petList" placeholder="例如：白发路路" onchange="runAnalysis()">
    </div>

    <div id="resultPanel" class="panel">
        <h3 style="margin-top:0; font-size: 16px; border-bottom: 2px solid #ddd; padding-bottom: 8px;">📊 胜率模拟与速度博弈</h3>
        <p style="margin: 5px 0;">预估胜率：<strong id="winRateText" style="font-size:18px; color:#2c3e50;">50%</strong></p >
        <div class="bar-bg"><div id="winRateBar" class="bar-fill"></div></div>
        
        <p id="speedAnalysis" style="font-weight: bold; margin-top: 15px;"></p >
        <p>克制倍率：<span id="multiplierText" style="font-weight: bold;">1.0x</span></p >

        <h3 style="margin-top:20px; font-size: 16px; border-bottom: 2px solid #ddd; padding-bottom: 8px;">⚠️ 敌方高危机制预警</h3>
        <div id="enemyTags" class="tags-container"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>
<script>
    let db = [];

    // 加载数据库
    async function loadData() {
        try {
            const res = await fetch('pet_data.json');
            db = await res.json();
            const dl = document.getElementById('petList');
            db.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.name;
                dl.appendChild(opt);
            });
            document.querySelector('h2').innerText = "🏆 洛克战术中心 (已就绪)";
        } catch (e) {
            document.querySelector('h2').innerText = "❌ 数据加载失败";
        }
    }

    // 运行核心分析逻辑
    function runAnalysis() {
        const myName = document.getElementById('myPet').value;
        const enName = document.getElementById('enemyPet').value;
        
        const myPet = db.find(p => p.name === myName);
        const enPet = db.find(p => p.name === enName);

        if (!myPet || !enPet) {
            document.getElementById('resultPanel').style.display = 'none';
            return;
        }

        // 1. 调用 engine.js 算胜率和速度
        const adv = RocoEngine.calculateAdvantage(myPet, enPet);
        
        // 更新 UI
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('winRateBar').style.width = adv.winRate + '%';
        document.getElementById('winRateText').innerText = adv.winRate + '%';
        
        // 动态变色
        if(adv.winRate > 60) document.getElementById('winRateBar').style.background = '#2ecc71';
        else if(adv.winRate < 40) document.getElementById('winRateBar').style.background = '#e74c3c';
        else document.getElementById('winRateBar').style.background = '#f1c40f';

        document.getElementById('speedAnalysis').innerHTML = adv.speedMsg;
        document.getElementById('multiplierText').innerText = adv.multiplier + 'x';
        document.getElementById('multiplierText').style.color = adv.multiplier > 1 ? '#2ecc71' : (adv.multiplier < 1 ? '#e74c3c' : '#333');

        // 2. 调用 engine.js 解析敌方机制（找技能里的删PP、硬控等）
        const tags = RocoEngine.analyzeMechanics(enPet);
        const tagContainer = document.getElementById('enemyTags');
        if (tags.length === 0) {
            tagContainer.innerHTML = '<div style="background:#e8f8f5; color:#16a085;">✅ 未检测到高危机制，按常规属性对战即可。</div>';
        } else {
            tagContainer.innerHTML = tags.map(t => `<div>${t}</div>`).join('');
        }
    }

    loadData();
</script>
</body>
</html>
