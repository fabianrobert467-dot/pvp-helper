<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克 PVP 终极辅助终端</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #2d3436; }
        .card { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { text-align: center; font-size: 18px; color: #2c3e50; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #636e72; font-size: 13px; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        
        /* 结果面板 */
        #resultPanel { display: none; margin-top: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .win-box { text-align: center; padding: 20px; background: #f8fafc; border-radius: 15px; margin-bottom: 15px; }
        .win-rate { font-size: 42px; font-weight: 800; color: #2d3436; margin-bottom: 5px; }
        .bar-bg { background: #dfe6e9; height: 10px; border-radius: 5px; overflow: hidden; margin: 15px 0; }
        .bar-fill { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .section-title { font-size: 14px; font-weight: bold; margin: 15px 0 8px; display: flex; align-items: center; }
        .tag { padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; line-height: 1.4; border-left: 5px solid; }
        .tag-red { background: #fff5f5; color: #c53030; border-color: #fc8181; }
        .tag-green { background: #f0fff4; color: #276749; border-color: #68d391; }
        .info-text { background: #edf2f7; color: #4a5568; padding: 12px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="mainStatus">⚙️ 系统初始化中...</h2>
    
    <datalist id="petList"></datalist>

    <div class="input-group">
        <label>🛡️ 我方首发精灵</label>
        <input type="text" id="myPet" list="petList" placeholder="输入关键字搜索..." autocomplete="off">
    </div>

    <div class="input-group">
        <label>🎯 敌方目标精灵</label>
        <input type="text" id="enemyPet" list="petList" placeholder="输入关键字搜索..." autocomplete="off">
    </div>

    <div id="resultPanel">
        <div class="win-box">
            <div id="winRateText" class="win-rate">50%</div>
            <div style="font-size:12px; color:#b2bec3;">实时对局胜率模拟</div>
            <div class="bar-bg"><div id="winRateBar" class="bar-fill"></div></div>
            <div id="moveOrderText" class="info-text">正在评估速度线...</div>
        </div>
        
        <div class="section-title">⚠️ 敌方核心威胁</div>
        <div id="enemyTags"></div>
        
        <div class="section-title">✅ 我方战术建议</div>
        <div id="myAdvice"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>

<script>
    let db = [];

    // 1. 加载并清洗数据
    window.onload = async function() {
        try {
            const res = await fetch('pet_data.json?v=' + Date.now());
            db = await res.json();
            const dl = document.getElementById('petList');
            db.forEach(p => {
                if(p.name) {
                    let opt = document.createElement('option');
                    opt.value = p.name;
                    dl.appendChild(opt);
                }
            });
            document.getElementById('mainStatus').innerText = "🏆 战术中心已就绪 (" + db.length + ")";
        } catch (e) {
            document.getElementById('mainStatus').innerText = "❌ 数据加载失败";
        }
    };

    // 2. 执行实时分析
    function checkAndRun() {
        const myName = document.getElementById('myPet').value.trim();
        const enName = document.getElementById('enemyPet').value.trim();
        
        const myPet = db.find(p => p.name === myName);
        const enPet = db.find(p => p.name === enName);

        const panel = document.getElementById('resultPanel');

        if (myPet && enPet) {
            panel.style.display = 'block';
            
            // A. 计算胜率
            const wr = RocoEngine.simulateWinRate(myPet, enPet);
            document.getElementById('winRateText').innerText = wr + '%';
            setTimeout(() => {
                document.getElementById('winRateBar').style.width = wr + '%';
            }, 100);

            // B. 获取速度与先手建议
            const strat = RocoEngine.getStrategy(myPet, enPet);
            document.getElementById('moveOrderText').innerText = strat.moveOrder;

            // C. 提取威胁与建议
            const myMech = RocoEngine.analyzeMechanics(myPet);
            const enMech = RocoEngine.analyzeMechanics(enPet);

            document.getElementById('enemyTags').innerHTML = enMech.threats
                .map(t => `<div class="tag tag-red">🚨 ${t}</div>`).join('');
            
            document.getElementById('myAdvice').innerHTML = myMech.advice
                .map(a => `<div class="tag tag-green">💡 ${a}</div>`).join('');

        } else {
            panel.style.display = 'none';
        }
    }

    document.getElementById('myPet').addEventListener('input', checkAndRun);
    document.getElementById('enemyPet').addEventListener('input', checkAndRun);
</script>
</body>
</html>
