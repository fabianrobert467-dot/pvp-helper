<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PVP Helper — V14 AlphaZero</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { margin: 6px; padding: 10px 14px; }
#out { margin-top: 16px; }
</style>
</head>

<body>

<h2>🧠 PVP Helper — V14 自我学习 AI</h2>

<button onclick="selfPlay()">🤖 自我对战训练</button>
<button onclick="runDecision()">🎯 当前决策建议</button>

<div id="out"></div>

<script>

// ===== 状态 =====
let state = { myhp: "high", enemyhp: "high" };
const actions = ["A","B","C","D"];

// ===== 编码 =====
function encode(s){
  let map = { low:0, mid:0.5, high:1 };
  return [ map[s.myhp], map[s.enemyhp] ];
}

// ===== 神经网络简化 =====
class NeuralNet {
  constructor(){ this.w = Math.random(); }
  forward(s){
    let [m,e] = encode(s);
    let policy = actions.map(a => Math.random());
    let sum = policy.reduce((a,b)=>a+b,0);
    policy = policy.map(p=>p/sum);
    let value = (m - e) * this.w;
    return { policy, value };
  }
  train(data){
    data.forEach(d => {
      this.w += 0.01 * (d.result - d.value);
    });
  }
}

let net = new NeuralNet();

// ===== 状态转移 =====
function step(s, action){
  let next = {...s};
  if(action==="A") next.enemyhp="mid";
  if(action==="B") next.enemyhp="low";
  if(action==="C") next.myhp="high";
  if(action==="D") next.enemyhp="low";
  return next;
}

// ===== Self-Play =====
function selfPlay(){
  let data = [];
  let s = { myhp:"high", enemyhp:"high" };

  for(let i=0;i<5;i++){
    let out = net.forward(s);
    let action = actions[out.policy.indexOf(Math.max(...out.policy))];
    let next = step(s, action);

    data.push({ state:s, value:out.value, result: (encode(next)[0]-encode(next)[1]) });
    s = next;
  }

  net.train(data);
  document.getElementById("out").innerHTML = "<p>训练完成 ✔ 权重已更新</p >";
}

// ===== 决策建议 =====
function runDecision(){
  let out = net.forward(state);
  let best = actions[out.policy.indexOf(Math.max(...out.policy))];
  document.getElementById("out").innerHTML = `
    <div>
      <b>推荐动作：</b> ${best}<br>
      <b>胜率估计：</b> ${out.value.toFixed(3)}
    </div>
  `;
}

</script>

</body>
</html>
