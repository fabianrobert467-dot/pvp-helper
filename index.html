<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克 PVP 诊断版</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; }
        .card { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #7f8c8d; font-size: 13px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #resultPanel { display: none; margin-top: 20px; padding: 15px; border-radius: 12px; background: #fff; border: 2px solid #3498db; }
        .debug-info { font-size: 12px; color: #e67e22; background: #fff3e0; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="mainStatus">📡 正在尝试连接数据库...</h2>
    
    <div id="debugBox" class="debug-info">诊断状态: 等待初始化...</div>

    <datalist id="petList"></datalist>

    <div class="input-group">
        <label>🛡️ 我方精灵 (输入一个字试试)</label>
        <input type="text" id="myPet" list="petList" placeholder="点击或输入名字" autocomplete="off">
    </div>

    <div class="input-group">
        <label>🎯 敌方精灵</label>
        <input type="text" id="enemyPet" list="petList" placeholder="点击或输入名字" autocomplete="off">
    </div>

    <div id="resultPanel">
        <h3 id="winRateText" style="text-align:center; font-size:30px; margin:10px 0;">--%</h3>
        <p id="moveOrderText" style="font-size:14px; color:#34495e; background:#f8fafc; padding:10px; border-radius:8px;"></p >
        <div id="enemyTags"></div>
        <div id="myAdvice" style="margin-top:10px;"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>

<script>
    let db = [];
    const statusH2 = document.getElementById('mainStatus');
    const debugBox = document.getElementById('debugBox');
    const dl = document.getElementById('petList');

    async function init() {
        try {
            // 强制刷新缓存
            const response = await fetch('pet_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error("无法获取 pet_data.json (错误码: " + response.status + ")");
            
            db = await response.json();
            
            if (!Array.isArray(db) || db.length === 0) {
                debugBox.innerText = "🚨 警告: 数据库文件是空的，或者格式不是 [{}, {}]";
                return;
            }

            // 检查第一个数据项的结构
            const firstPet = db[0];
            const nameKey = firstPet.name ? 'name' : (firstPet.精灵名 ? '精灵名' : null);
            
            if (!nameKey) {
                debugBox.innerText = "🚨 错误: 数据里找不到 'name' 字段。实际字段名是: " + Object.keys(firstPet).join(', ');
                return;
            }

            // 填充列表
            dl.innerHTML = "";
            db.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p[nameKey].trim();
                dl.appendChild(opt);
            });

            statusH2.innerText = "🏆 成功载入 " + db.length + " 只精灵";
            debugBox.style.display = "none"; // 成功后隐藏诊断栏

        } catch (err) {
            statusH2.innerText = "❌ 加载失败";
            debugBox.innerText = "错误详情: " + err.message;
        }
    }

    function run() {
        const myName = document.getElementById('myPet').value.trim();
        const enName = document.getElementById('enemyPet').value.trim();
        const myPet = db.find(p => p.name === myName);
        const enPet = db.find(p => p.name === enName);

        if (myPet && enPet) {
            document.getElementById('resultPanel').style.display = 'block';
            const wr = RocoEngine.simulateWinRate(myPet, enPet);
            document.getElementById('winRateText').innerText = wr + '%';
            document.getElementById('moveOrderText').innerText = RocoEngine.getStrategy(myPet, enPet).moveOrder;
            
            const enMech = RocoEngine.analyzeMechanics(enPet);
            document.getElementById('enemyTags').innerHTML = enMech.threats.map(t => `<div style="color:red; font-size:12px;">⚠️ ${t}</div>`).join('');
        }
    }

    document.getElementById('myPet').addEventListener('input', run);
    document.getElementById('enemyPet').addEventListener('input', run);
    
    // 启动
    init();
</script>
</body>
</html>
