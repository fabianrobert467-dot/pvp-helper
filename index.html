<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVP COMMAND CENTER</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; padding: 15px; margin: 0; }
        .dashboard { background: #1e293b; max-width: 500px; margin: 0 auto; border-radius: 16px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { text-align: center; color: #38bdf8; font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        
        .hud-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #38bdf8; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .hud-hp { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #10b981; }
        .hud-hp.enemy { border-left-color: #ef4444; }
        .hud-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; margin-bottom: 10px; color: #94a3b8; }
        input[type="range"] { width: 100%; accent-color: #38bdf8; }

        #analytics { display: none; margin-top: 20px; border-top: 1px dashed #334155; padding-top: 20px; }
        .win-rate { font-size: 64px; font-weight: 900; color: #fff; text-align: center; margin: 10px 0; text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        
        .log-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; line-height: 1.6; color: #cbd5e1; }
        .log-item { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #1e293b; }
        .log-item:last-child { border: none; margin: 0; padding: 0; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header" id="status">INITIATING UPLINK...</div>
    
    <div class="hud-row">
        <input type="text" id="myN" list="pl" placeholder="ALLY TARGET" onfocus="this.value=''">
        <input type="text" id="enN" list="pl" placeholder="HOSTILE TARGET" onfocus="this.value=''">
    </div>
    <datalist id="pl"></datalist>

    <div class="hud-hp">
        <div class="hud-label"><span>ALLY HP INTEGRITY</span><span id="myHpVal" style="color:#10b981;">100%</span></div>
        <input type="range" id="myHp" min="0" max="100" value="100">
    </div>
    <div class="hud-hp enemy">
        <div class="hud-label"><span>HOSTILE HP INTEGRITY</span><span id="enHpVal" style="color:#ef4444;">100%</span></div>
        <input type="range" id="enHp" min="0" max="100" value="100">
    </div>

    <div id="analytics">
        <div style="text-align:center; font-size:12px; color:#94a3b8; letter-spacing:1px;">CALCULATED WIN PROBABILITY</div>
        <div class="win-rate" id="wrText">50%</div>
        <div class="log-box" id="intelLog"></div>
    </div>
</div>

<script src="config.js"></script> <script src="engine.js"></script>
<script>
    let db = [];
    let currentMy = null, currentEn = null;

    async function init() {
        try {
            const r = await fetch('pet_data.json?v=' + Date.now());
            db = await r.json();
            const l = document.getElementById('pl');
            db.forEach(p => { if(p.name){ let o = document.createElement('option'); o.value = p.name; l.appendChild(o); }});
            document.getElementById('status').innerText = `SYSTEM ONLINE [V-ULTRA]`;
        } catch(e) { document.getElementById('status').innerText = "CRITICAL ERROR: DATA NOT FOUND"; }
    }

    function executeAnalysis() {
        const mN = document.getElementById('myN').value.trim();
        const eN = document.getElementById('enN').value.trim();
        const mHp = parseInt(document.getElementById('myHp').value);
        const eHp = parseInt(document.getElementById('enHp').value);
        
        document.getElementById('myHpVal').innerText = mHp + "%";
        document.getElementById('enHpVal').innerText = eHp + "%";

        if (!currentMy || currentMy.name !== mN) currentMy = db.find(p => p.name === mN);
        if (!currentEn || currentEn.name !== eN) currentEn = db.find(p => p.name === eN);

        const aPnl = document.getElementById('analytics');
        
        if (currentMy && currentEn) {
            aPnl.style.display = 'block';
            
            // 调取核心伤害与战术引擎
            const res = RocoEngine.analyzeTactics(currentMy, currentEn, mHp, eHp);
            
            document.getElementById('wrText').innerText = res.winRate + "%";
            document.getElementById('wrText').style.color = res.winRate > 50 ? "#10b981" : "#ef4444";
            
            let htmlLog = `<div class="log-item">[*] 基础速度判定：${res.speedWinner}占优</div>`;
            res.intel.forEach(msg => { htmlLog += `<div class="log-item">${msg}</div>`; });
            document.getElementById('intelLog').innerHTML = htmlLog;
            
        } else {
            aPnl.style.display = 'none';
        }
    }

    ['myN','enN','myHp','enHp'].forEach(id => document.getElementById(id).addEventListener('input', executeAnalysis));
    init();
</script>
</body>
</html>
